<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    /* ===== 基础变量 ===== */
    :root {
      --primary-color: #1a1a2e;
      --accent-color: #e94560;
      --secondary-color: #16213e;
      --text-color: #333;
      --text-light: #666;
      --bg-light: #f8f9fa;
      --border-color: #e0e0e0;
    }

    /* ===== 页面设置 ===== */
    @page {
      size: A4;
      margin: 2cm 2.5cm;
      @bottom-center {
        content: counter(page);
        font-size: 10pt;
        color: var(--text-light);
      }
    }

    @page :first {
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.8;
      color: var(--text-color);
      background: #fff;
    }

    /* ===== 封面页 ===== */
    .cover {
      width: 210mm;
      height: 297mm;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
      page-break-after: always;
    }

    .cover::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(233, 69, 96, 0.3) 0%, transparent 70%);
      top: -200px;
      right: -200px;
    }

    .cover::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(233, 69, 96, 0.2) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
    }

    .cover-content {
      z-index: 1;
      padding: 40px;
    }

    .cover-badge {
      display: inline-block;
      background: var(--accent-color);
      color: white;
      padding: 8px 24px;
      border-radius: 20px;
      font-size: 12pt;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .cover-title {
      font-size: 36pt;
      font-weight: 700;
      margin-bottom: 20px;
      line-height: 1.3;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .cover-subtitle {
      font-size: 16pt;
      font-weight: 300;
      opacity: 0.9;
      margin-bottom: 60px;
      max-width: 500px;
    }

    .cover-meta {
      font-size: 11pt;
      opacity: 0.7;
    }

    .cover-meta span {
      margin: 0 15px;
    }

    .cover-decoration {
      position: absolute;
      bottom: 60px;
      display: flex;
      gap: 8px;
    }

    .cover-decoration span {
      width: 40px;
      height: 4px;
      background: var(--accent-color);
      border-radius: 2px;
    }

    .cover-decoration span:nth-child(2) {
      width: 20px;
      opacity: 0.6;
    }

    .cover-decoration span:nth-child(3) {
      width: 10px;
      opacity: 0.3;
    }

    /* ===== 目录页 ===== */
    .toc {
      page-break-after: always;
      padding: 40px 0;
    }

    .toc h2 {
      font-size: 24pt;
      color: var(--primary-color);
      margin-bottom: 40px;
      padding-bottom: 15px;
      border-bottom: 3px solid var(--accent-color);
    }

    .toc-list {
      list-style: none;
    }

    .toc-item {
      display: flex;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px dotted var(--border-color);
    }

    .toc-item.level-1 {
      font-weight: 600;
      font-size: 12pt;
    }

    .toc-item.level-2 {
      padding-left: 30px;
      font-size: 11pt;
    }

    .toc-item.level-3 {
      padding-left: 60px;
      font-size: 10pt;
      color: var(--text-light);
    }

    .toc-title {
      flex: 1;
    }

    .toc-page {
      color: var(--accent-color);
      font-weight: 600;
    }

    /* ===== 正文内容 ===== */
    .content {
      padding: 20px 0;
    }

    h1 {
      font-size: 22pt;
      color: var(--primary-color);
      margin: 40px 0 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--accent-color);
      page-break-after: avoid;
    }

    h2 {
      font-size: 16pt;
      color: var(--primary-color);
      margin: 30px 0 15px;
      padding-left: 15px;
      border-left: 4px solid var(--accent-color);
      page-break-after: avoid;
    }

    h3 {
      font-size: 13pt;
      color: var(--secondary-color);
      margin: 20px 0 10px;
      page-break-after: avoid;
    }

    h4 {
      font-size: 11pt;
      color: var(--text-color);
      margin: 15px 0 8px;
      font-weight: 600;
    }

    p {
      margin: 12px 0;
      text-align: justify;
    }

    /* ===== 列表 ===== */
    ul, ol {
      margin: 15px 0;
      padding-left: 25px;
    }

    li {
      margin: 8px 0;
    }

    li::marker {
      color: var(--accent-color);
    }

    /* ===== 强调框 ===== */
    .highlight-box {
      background: linear-gradient(135deg, #fff5f7 0%, #fff 100%);
      border-left: 4px solid var(--accent-color);
      padding: 20px 25px;
      margin: 25px 0;
      border-radius: 0 8px 8px 0;
    }

    .highlight-box.warning {
      background: linear-gradient(135deg, #fff8e6 0%, #fff 100%);
      border-left-color: #f59e0b;
    }

    .highlight-box.tip {
      background: linear-gradient(135deg, #e6fff9 0%, #fff 100%);
      border-left-color: #10b981;
    }

    .highlight-box-title {
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== 表格 ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 25px 0;
      font-size: 10pt;
    }

    thead {
      background: var(--primary-color);
      color: white;
    }

    th {
      padding: 12px 15px;
      text-align: left;
      font-weight: 600;
    }

    td {
      padding: 10px 15px;
      border-bottom: 1px solid var(--border-color);
    }

    tbody tr:nth-child(even) {
      background: var(--bg-light);
    }

    tbody tr:hover {
      background: #fff5f7;
    }

    /* ===== 检查清单 ===== */
    .checklist {
      list-style: none;
      padding: 0;
      background: var(--bg-light);
      border-radius: 8px;
      padding: 20px 25px;
      margin: 25px 0;
    }

    .checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border-color);
    }

    .checklist li:last-child {
      border-bottom: none;
    }

    .checklist li::before {
      content: "☐";
      color: var(--accent-color);
      font-size: 14pt;
      flex-shrink: 0;
    }

    /* ===== 流程图/图表容器 ===== */
    .diagram-container {
      background: var(--bg-light);
      border-radius: 12px;
      padding: 30px;
      margin: 30px 0;
      text-align: center;
    }

    .diagram-container .mermaid {
      display: flex;
      justify-content: center;
    }

    .diagram-caption {
      font-size: 10pt;
      color: var(--text-light);
      margin-top: 15px;
      font-style: italic;
    }

    /* ===== 引用块 ===== */
    blockquote {
      border-left: 4px solid var(--accent-color);
      padding: 15px 20px;
      margin: 20px 0;
      background: var(--bg-light);
      font-style: italic;
      color: var(--text-light);
    }

    blockquote strong {
      color: var(--primary-color);
      font-style: normal;
    }

    /* ===== 代码块 ===== */
    code {
      font-family: "SF Mono", "Monaco", "Consolas", monospace;
      background: var(--bg-light);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: var(--accent-color);
    }

    pre {
      background: var(--primary-color);
      color: #e0e0e0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 20px 0;
    }

    pre code {
      background: none;
      padding: 0;
      color: inherit;
    }

    /* ===== 数字卡片 ===== */
    .number-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin: 30px 0;
    }

    .number-card {
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
      color: white;
      padding: 25px 20px;
      border-radius: 12px;
      text-align: center;
    }

    .number-card-value {
      font-size: 28pt;
      font-weight: 700;
      color: var(--accent-color);
    }

    .number-card-label {
      font-size: 10pt;
      opacity: 0.8;
      margin-top: 8px;
    }

    /* ===== 步骤指南 ===== */
    .steps {
      counter-reset: step;
      margin: 30px 0;
    }

    .step {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      padding: 20px;
      background: var(--bg-light);
      border-radius: 8px;
    }

    .step::before {
      counter-increment: step;
      content: counter(step);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--accent-color);
      color: white;
      border-radius: 50%;
      font-weight: 700;
      flex-shrink: 0;
    }

    .step-content {
      flex: 1;
    }

    .step-title {
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 8px;
    }

    /* ===== 分页控制 ===== */
    .page-break {
      page-break-after: always;
    }

    h1, h2, h3 {
      page-break-after: avoid;
    }

    .keep-together {
      page-break-inside: avoid;
    }

    /* ===== 页眉页脚 ===== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 30px;
      background: var(--bg-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5cm;
      font-size: 9pt;
      color: var(--text-light);
      border-bottom: 1px solid var(--border-color);
    }

    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9pt;
      color: var(--text-light);
    }

    /* ===== 打印优化 ===== */
    @media print {
      body {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .cover {
        -webkit-print-color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>
  <!-- 封面 -->
  <div class="cover">
    <div class="cover-content">
      <div class="cover-badge">{{BADGE}}</div>
      <h1 class="cover-title">{{TITLE}}</h1>
      <p class="cover-subtitle">{{SUBTITLE}}</p>
      <div class="cover-meta">
        <span>{{AUTHOR}}</span>
        <span>|</span>
        <span>{{DATE}}</span>
      </div>
    </div>
    <div class="cover-decoration">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- 目录 -->
  <div class="toc">
    <h2>目录</h2>
    <ul class="toc-list">
      {{TOC_CONTENT}}
    </ul>
  </div>

  <!-- 正文内容 -->
  <div class="content">
    {{MAIN_CONTENT}}
  </div>

  <script>
    mermaid.initialize({
      startOnLoad: true,
      theme: 'base',
      themeVariables: {
        primaryColor: '#e94560',
        primaryTextColor: '#1a1a2e',
        primaryBorderColor: '#1a1a2e',
        lineColor: '#16213e',
        secondaryColor: '#f8f9fa',
        tertiaryColor: '#fff'
      }
    });
  </script>
</body>
</html>
